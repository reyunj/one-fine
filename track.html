<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Track Order - Vinyl Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #000000;
            --primary-light: #1a1a1a;
            --secondary-color: #f5f5f5;
            --accent-color: #dc2626;
            --accent-hover: #b91c1c;
            --text-dark: #000000;
            --text-light: #666666;
            --border-color: #e0e0e0;
            --success-color: #dc2626;
            --success-hover: #b91c1c;
            --gradient-primary: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            --gradient-success: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        header {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 1rem 0;
            box-shadow: var(--shadow-md);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: white;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .back-btn:hover {
            background: white;
            color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        main {
            padding: 3rem 0;
        }

        .tracking-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .tracking-title {
            font-size: 2rem;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .tracking-subtitle {
            color: var(--text-light);
        }

        .search-section {
            max-width: 600px;
            margin: 0 auto 3rem;
        }

        .search-box {
            display: flex;
            gap: 1rem;
        }

        .search-input {
            flex: 1;
            padding: 1rem 1.5rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
        }

        .search-btn {
            padding: 1rem 2rem;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-md);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .tracking-result {
            display: none;
            max-width: 900px;
            margin: 0 auto;
        }

        .tracking-card {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid var(--border-color);
        }

        .order-info h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .order-id {
            color: var(--accent-color);
            font-weight: 700;
            font-size: 1.1rem;
        }

        .order-status-badge {
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-processing {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-shipped {
            background: #e0e7ff;
            color: #3730a3;
        }

        .status-delivered {
            background: #dcfce7;
            color: #166534;
        }

        .tracking-timeline {
            margin: 2rem 0;
        }

        .timeline-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-dark);
        }

        .timeline {
            position: relative;
            padding-left: 2.5rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 12px;
            height: calc(var(--line-height, 100%) - 12px);
            width: 3px;
            background: var(--border-color);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 2rem;
            padding-left: 1rem;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -43px;
            top: 0.3rem;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--border-color);
            border: 3px solid white;
            box-shadow: var(--shadow-sm);
        }

        .timeline-item.completed::before {
            background: var(--accent-color);
        }

        .timeline-item.current::before {
            background: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.2);
        }

        .timeline-item.completed .timeline-content {
            opacity: 1;
        }

        .timeline-item:not(.completed) .timeline-content {
            opacity: 0.5;
        }

        .timeline-content h4 {
            font-weight: 700;
            margin-bottom: 0.25rem;
            color: var(--text-dark);
        }

        .timeline-content p {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .timeline-date {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 0.25rem;
        }

        .order-details {
            margin-top: 2rem;
        }

        .details-section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-dark);
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border-color);
        }

        .items-grid {
            display: grid;
            gap: 1rem;
        }

        .item-card {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: var(--secondary-color);
            border-radius: 12px;
        }

        .item-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }

        .item-info {
            flex: 1;
        }

        .item-title {
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.25rem;
        }

        .item-details {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .item-price {
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .shipping-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .info-card {
            padding: 1rem;
            background: var(--secondary-color);
            border-radius: 12px;
        }

        .info-label {
            font-size: 0.85rem;
            color: var(--text-light);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
        }

        .info-value {
            font-weight: 700;
            color: var(--text-dark);
        }

        .total-section {
            text-align: center;
            padding: 1.5rem;
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            border-radius: 12px;
            margin-top: 2rem;
        }

        .total-label {
            font-size: 0.9rem;
            color: var(--text-light);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .total-value {
            font-size: 2rem;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .not-found {
            display: none;
            text-align: center;
            padding: 4rem;
            color: var(--text-light);
        }

        .not-found-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .search-box {
                flex-direction: column;
            }

            .order-header {
                flex-direction: column;
                gap: 1rem;
            }

            .items-grid {
                grid-template-columns: 1fr;
            }

            .shipping-info {
                grid-template-columns: 1fr;
            }

            .item-card {
                flex-direction: column;
            }

            .item-image {
                width: 100%;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <img src="/public/logo.jpg" alt="Vinyl Store Logo" style="height: 50px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);">
                </a>
                <a href="index.html" class="back-btn">← Back to Store</a>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="tracking-header">
                <h1 class="tracking-title">Track Your Order</h1>
                <p class="tracking-subtitle">Enter your order ID to check the status of your delivery</p>
            </div>

            <div class="search-section">
                <div class="search-box">
                    <input type="text" class="search-input" id="searchInput" placeholder="Enter Order ID (e.g., ORD-1234567890)">
                    <button class="search-btn" onclick="trackOrder()">Track Order</button>
                </div>
            </div>

            <div class="tracking-result" id="trackingResult">
                <div class="tracking-card">
                    <div class="order-header">
                        <div class="order-info">
                            <h2>Order Status</h2>
                            <div class="order-id" id="orderId"></div>
                        </div>
                        <span class="order-status-badge" id="orderStatus"></span>
                    </div>

                    <div class="tracking-timeline">
                        <h3 class="timeline-title">Shipping Progress</h3>
                        <div class="timeline" id="timeline">
                        </div>
                    </div>

                    <div class="order-details">
                        <div class="details-section">
                            <h3 class="section-title">Order Items</h3>
                            <div class="items-grid" id="itemsGrid">
                            </div>
                        </div>

                        <div class="details-section">
                            <h3 class="section-title">Shipping Information</h3>
                            <div class="shipping-info">
                                <div class="info-card">
                                    <div class="info-label">Recipient</div>
                                    <div class="info-value" id="recipientName"></div>
                                </div>
                                <div class="info-card">
                                    <div class="info-label">Phone</div>
                                    <div class="info-value" id="recipientPhone"></div>
                                </div>
                                <div class="info-card">
                                    <div class="info-label">Address</div>
                                    <div class="info-value" id="shippingAddress"></div>
                                </div>
                                <div class="info-card">
                                    <div class="info-label">Payment Method</div>
                                    <div class="info-value" id="paymentMethod"></div>
                                </div>
                            </div>
                        </div>

                        <div class="total-section">
                            <div class="total-label">Order Total</div>
                            <div class="total-value" id="orderTotal"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="not-found" id="notFound">
                <div class="not-found-icon">📦</div>
                <h3>Order Not Found</h3>
                <p>Please check your order ID and try again.</p>
            </div>
        </div>
    </main>

    <script>
        function trackOrder() {
            const orderId = document.getElementById('searchInput').value.trim();
            if (!orderId) {
                alert('Please enter an Order ID');
                return;
            }

            const orders = JSON.parse(localStorage.getItem('vinylStoreOrders') || '[]');
            const order = orders.find(o => o.id.toLowerCase() === orderId.toLowerCase());

            if (!order) {
                document.getElementById('trackingResult').style.display = 'none';
                document.getElementById('notFound').style.display = 'block';
                return;
            }

            document.getElementById('notFound').style.display = 'none';
            document.getElementById('trackingResult').style.display = 'block';

            // Update order info
            document.getElementById('orderId').textContent = order.id;
            
            const status = order.status || 'pending';
            const statusElement = document.getElementById('orderStatus');
            statusElement.textContent = status.charAt(0).toUpperCase() + status.slice(1);
            statusElement.className = 'order-status-badge status-' + status;

            // Update timeline
            updateTimeline(status);

            // Update items
            const itemsGrid = document.getElementById('itemsGrid');
            itemsGrid.innerHTML = order.items.map(item => `
                <div class="item-card">
                    <img src="${item.image}" alt="${item.title}" class="item-image">
                    <div class="item-info">
                        <div class="item-title">${item.title}</div>
                        <div class="item-details">${item.artist} - ${item.size} × ${item.quantity}</div>
                        <div class="item-price">₱${(item.price * item.quantity).toLocaleString()}</div>
                    </div>
                </div>
            `).join('');

            // Update shipping info
            document.getElementById('recipientName').textContent = `${order.customer.firstName} ${order.customer.lastName}`;
            document.getElementById('recipientPhone').textContent = order.customer.phone;
            document.getElementById('shippingAddress').textContent = `${order.customer.address}, ${order.customer.city} ${order.customer.zipCode}`;
            document.getElementById('paymentMethod').textContent = order.customer.paymentMethod || 'N/A';

            // Update total
            document.getElementById('orderTotal').textContent = '₱' + order.total.toLocaleString();
        }

        function updateTimeline(status) {
            const timeline = document.getElementById('timeline');
            const statuses = ['pending', 'processing', 'shipped', 'delivered'];
            const statusLabels = {
                'pending': 'Order Placed',
                'processing': 'Processing',
                'shipped': 'Shipped',
                'delivered': 'Delivered'
            };
            const statusDescriptions = {
                'pending': 'Your order has been received and is being processed',
                'processing': 'Your order is being prepared for shipment',
                'shipped': 'Your order has been shipped and is on its way',
                'delivered': 'Your order has been delivered successfully'
            };

            const currentIndex = statuses.indexOf(status);

            timeline.innerHTML = statuses.map((s, index) => {
                const isCompleted = index <= currentIndex;
                const isCurrent = index === currentIndex;
                const date = index === 0 ? new Date().toLocaleDateString() : (isCompleted ? 'Updated' : 'Pending');
                
                return `
                    <div class="timeline-item ${isCompleted ? 'completed' : ''} ${isCurrent ? 'current' : ''}">
                        <div class="timeline-content">
                            <h4>${statusLabels[s]}</h4>
                            <p>${statusDescriptions[s]}</p>
                            <div class="timeline-date">${date}</div>
                        </div>
                    </div>
                `;
            }).join('');

            // Calculate and set line height based on current step position
            setTimeout(() => {
                const items = timeline.querySelectorAll('.timeline-item');
                if (items.length > 0 && currentIndex >= 0) {
                    const currentItem = items[currentIndex];
                    const currentItemTop = currentItem.offsetTop;
                    const circleCenter = 12; // Half of circle height (20px) + top offset (0.3rem ≈ 5px)
                    timeline.style.setProperty('--line-height', (currentItemTop + circleCenter) + 'px');
                }
            }, 0);
        }

        // Allow Enter key to search
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                trackOrder();
            }
        });
    </script>
</body>
</html>
