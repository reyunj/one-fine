<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Vinyl Store - Premium Album Collection (Philippines)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #000000;
            --primary-light: #1a1a1a;
            --secondary-color: #f5f5f5;
            --accent-color: #dc2626;
            --accent-hover: #b91c1c;
            --text-dark: #000000;
            --text-light: #666666;
            --border-color: #e0e0e0;
            --success-color: #dc2626;
            --success-hover: #b91c1c;
            --gradient-primary: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            --gradient-success: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        header {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-md);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            color: white;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            background: var(--gradient-primary);
            border: none;
            font-size: 1.5rem;
            color: white;
            padding: 0.75rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-md);
        }

        .cart-icon:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--success-color);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            box-shadow: var(--shadow-sm);
            border: 2px solid white;
        }

        .track-order-btn {
            color: white;
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .track-order-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .track-order-icon {
            display: none;
            width: 24px;
            height: 24px;
        }

        .track-order-text {
            display: block;
        }

        .track-order-text-short {
            display: none;
        }

        main {
            padding: 3rem 0;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2.5rem;
            margin-bottom: 2rem;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border-color);
            position: relative;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-xl);
        }

        .product-card:hover::before {
            opacity: 1;
        }

        .product-image {
            width: 100%;
            height: 320px;
            object-fit: cover;
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            transition: transform 0.4s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-info {
            padding: 2rem;
        }

        .product-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            line-height: 1.3;
        }

        .product-artist {
            color: var(--text-light);
            margin-bottom: 1rem;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .product-price {
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
        }

        .size-selector {
            margin-bottom: 1.5rem;
        }

        .size-label {
            display: block;
            margin-bottom: 0.75rem;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .size-options {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .size-option {
            padding: 0.6rem 1.25rem;
            border: 2px solid var(--border-color);
            background: white;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .size-option:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
            transform: translateY(-2px);
        }

        .size-option.selected {
            background: var(--gradient-primary);
            color: white;
            border-color: transparent;
            box-shadow: var(--shadow-md);
        }

        .add-to-cart-btn {
            width: 100%;
            padding: 1.1rem;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-md);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .add-to-cart-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .add-to-cart-btn:active {
            transform: translateY(0);
        }

        .add-to-cart-btn:disabled {
            background: var(--text-light);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
        }

        .cart-content {
            position: absolute;
            right: 0;
            top: 0;
            width: 450px;
            height: 100%;
            background: white;
            overflow-y: auto;
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-xl);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
            }
            to {
                transform: translateX(0);
            }
        }

        .cart-header {
            padding: 2rem;
            background: var(--primary-color);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-md);
        }

        .cart-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .close-cart {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-cart:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        .cart-items {
            padding: 2rem;
        }

        .cart-item {
            display: flex;
            gap: 1.25rem;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .cart-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .cart-item-image {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-title {
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-size: 1.1rem;
        }

        .cart-item-details {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            font-weight: 500;
        }

        .cart-item-price {
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.2rem;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 0.75rem;
        }

        .quantity-btn {
            width: 36px;
            height: 36px;
            border: 2px solid var(--border-color);
            background: white;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            color: var(--text-dark);
        }

        .quantity-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
            transform: scale(1.1);
        }

        .quantity {
            padding: 0 0.75rem;
            font-weight: 700;
            font-size: 1.1rem;
            min-width: 30px;
            text-align: center;
        }

        .remove-item {
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 0.75rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .remove-item:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .cart-footer {
            padding: 2rem;
            background: var(--secondary-color);
            position: sticky;
            bottom: 0;
            border-top: 1px solid var(--border-color);
            box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-dark);
        }

        .cart-total span:last-child {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .checkout-btn {
            width: 100%;
            padding: 1.2rem;
            background: var(--gradient-success);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-md);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .checkout-btn:hover {
            background: var(--success-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .checkout-btn:active {
            transform: translateY(0);
        }

        .empty-cart {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-light);
        }

        .empty-cart-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        @media (max-width: 1200px) {
            .container {
                padding: 0 20px;
            }

            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                gap: 2rem;
            }
        }

        @media (max-width: 992px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 1.75rem;
            }

            .cart-content {
                width: 400px;
            }
        }

        @media (max-width: 768px) {
            .header-content {
                gap: 0.75rem;
            }

            .logo img {
                height: 40px;
            }

            .track-order-icon {
                display: none;
            }

            .track-order-text {
                display: none;
            }

            .track-order-text-short {
                display: block;
            }

            .track-order-btn {
                padding: 0.75rem;
            }

            main {
                padding: 2rem 0;
            }

            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 1.5rem;
            }

            .product-card {
                border-radius: 16px;
            }

            .product-image {
                height: 280px;
            }

            .product-info {
                padding: 1.5rem;
            }

            .product-title {
                font-size: 1.2rem;
            }

            .product-price {
                font-size: 1.5rem;
            }

            .cart-content {
                width: 100%;
            }

            .cart-header {
                padding: 1.5rem;
            }

            .cart-items {
                padding: 1.5rem;
            }

            .cart-footer {
                padding: 1.5rem;
            }

            .cart-item-image {
                width: 80px;
                height: 80px;
            }
        }

        @media (max-width: 576px) {
            .container {
                padding: 0 16px;
            }

            .logo img {
                height: 35px;
            }

            .track-order-icon {
                display: none;
            }

            .track-order-text {
                display: none;
            }

            .track-order-text-short {
                display: block;
            }

            .track-order-btn {
                padding: 0.6rem;
            }

            main {
                padding: 1.5rem 0;
            }

            .products-grid {
                grid-template-columns: 1fr;
                gap: 1.25rem;
            }

            .product-card {
                border-radius: 14px;
            }

            .product-image {
                height: 250px;
            }

            .product-info {
                padding: 1.25rem;
            }

            .product-title {
                font-size: 1.1rem;
            }

            .product-price {
                font-size: 1.4rem;
            }

            .size-option {
                padding: 0.5rem 1rem;
                font-size: 0.85rem;
            }

            .add-to-cart-btn {
                padding: 0.9rem;
                font-size: 0.9rem;
            }

            .cart-item {
                flex-direction: column;
                gap: 0.75rem;
            }

            .cart-item-image {
                width: 100%;
                height: 180px;
            }

            .cart-total {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 400px) {
            .container {
                padding: 0 12px;
            }

            header {
                padding: 0.75rem 0;
            }

            .logo img {
                height: 30px;
            }

            main {
                padding: 1rem 0;
            }

            .products-grid {
                gap: 1rem;
            }

            .product-card {
                border-radius: 12px;
            }

            .product-image {
                height: 220px;
            }

            .product-info {
                padding: 1rem;
            }

            .product-title {
                font-size: 1rem;
            }

            .product-price {
                font-size: 1.3rem;
            }

            .size-options {
                gap: 0.5rem;
            }

            .size-option {
                padding: 0.4rem 0.8rem;
                font-size: 0.8rem;
            }

            .add-to-cart-btn {
                padding: 0.8rem;
                font-size: 0.85rem;
                letter-spacing: 0.3px;
            }

            .cart-header {
                padding: 1rem;
            }

            .cart-items {
                padding: 1rem;
            }

            .cart-footer {
                padding: 1rem;
            }

            .cart-total {
                font-size: 1.2rem;
            }

            .checkout-btn {
                padding: 1rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="#" class="logo">
                    <img src="/public/logo.jpg" alt="Vinyl Store Logo" style="height: 50px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);">
                </a>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <a href="track.html" class="track-order-btn">
                        <svg class="track-order-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                        <span class="track-order-text">Track Order</span>
                        <span class="track-order-text-short">Track</span>
                    </a>
                    <button class="cart-icon" onclick="toggleCart()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 2L6 9H3L4 21H20L21 9H18L15 2H9Z"/>
                            <path d="M9 9V2M15 9V2"/>
                        </svg>
                        <span class="cart-count" id="cartCount">0</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="products-grid" id="productsGrid"></div>
        </div>
    </main>

    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>Shopping Cart</h2>
                <button class="close-cart" onclick="toggleCart()">×</button>
            </div>
            <div class="cart-items" id="cartItems"></div>
            <div class="cart-footer">
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="cartTotal">₱0.00</span>
                </div>
                <button class="checkout-btn" onclick="proceedToCheckout()">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            {
                id: 1,
                title: "The Dark Side of the Moon",
                artist: "Pink Floyd",
                price: 1959,
                image: "https://picsum.photos/seed/album1/300/300",
                sizes: ["LP", "CD", "Cassette"]
            },
            {
                id: 2,
                title: "Abbey Road",
                artist: "The Beatles",
                price: 1679,
                image: "https://picsum.photos/seed/album2/300/300",
                sizes: ["LP", "CD", "Cassette"]
            },
            {
                id: 3,
                title: "Led Zeppelin IV",
                artist: "Led Zeppelin",
                price: 1847,
                image: "https://picsum.photos/seed/album3/300/300",
                sizes: ["LP", "CD", "Cassette"]
            },
            {
                id: 4,
                title: "Thriller",
                artist: "Michael Jackson",
                price: 1567,
                image: "https://picsum.photos/seed/album4/300/300",
                sizes: ["LP", "CD", "Cassette"]
            },
            {
                id: 5,
                title: "Back in Black",
                artist: "AC/DC",
                price: 1791,
                image: "https://picsum.photos/seed/album5/300/300",
                sizes: ["LP", "CD", "Cassette"]
            },
            {
                id: 6,
                title: "The Wall",
                artist: "Pink Floyd",
                price: 2071,
                image: "https://picsum.photos/seed/album6/300/300",
                sizes: ["LP", "CD", "Cassette"]
            },
            {
                id: 7,
                title: "Rumours",
                artist: "Fleetwood Mac",
                price: 1623,
                image: "https://picsum.photos/seed/album7/300/300",
                sizes: ["LP", "CD", "Cassette"]
            },
            {
                id: 8,
                title: "Hotel California",
                artist: "Eagles",
                price: 1735,
                image: "https://picsum.photos/seed/album8/300/300",
                sizes: ["LP", "CD", "Cassette"]
            }
        ];

        let cart = [];
        let selectedSizes = {};

        function initializeApp() {
            renderProducts();
            loadCartFromStorage();
            updateCartUI();
        }

        function renderProducts() {
            const productsGrid = document.getElementById('productsGrid');
            productsGrid.innerHTML = products.map(product => `
                <div class="product-card">
                    <img src="${product.image}" alt="${product.title}" class="product-image">
                    <div class="product-info">
                        <h3 class="product-title">${product.title}</h3>
                        <p class="product-artist">${product.artist}</p>
                        <p class="product-price">₱${product.price.toFixed(2)}</p>
                        <div class="size-selector">
                            <label class="size-label">Format:</label>
                            <div class="size-options">
                                ${product.sizes.map(size => `
                                    <button class="size-option" onclick="selectSize(${product.id}, '${size}', this)">
                                        ${size}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                        <button class="add-to-cart-btn" onclick="addToCart(${product.id})" id="addBtn-${product.id}">
                            Add to Cart
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function selectSize(productId, size, element) {
            const sizeOptions = element.parentElement.querySelectorAll('.size-option');
            sizeOptions.forEach(option => option.classList.remove('selected'));
            element.classList.add('selected');
            selectedSizes[productId] = size;
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const selectedSize = selectedSizes[productId];
            
            if (!selectedSize) {
                alert('Please select a format (LP, CD, or Cassette)');
                return;
            }

            const existingItem = cart.find(item => item.id === productId && item.size === selectedSize);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({
                    ...product,
                    size: selectedSize,
                    quantity: 1
                });
            }

            updateCartUI();
            saveCartToStorage();
            
            const button = document.getElementById(`addBtn-${productId}`);
            button.textContent = 'Added!';
            button.disabled = true;
            
            setTimeout(() => {
                button.textContent = 'Add to Cart';
                button.disabled = false;
            }, 1000);
        }

        function updateCartUI() {
            const cartCount = document.getElementById('cartCount');
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');
            
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.textContent = totalItems;
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<div class="empty-cart">Your cart is empty</div>';
                cartTotal.textContent = '₱0.00';
                return;
            }

            cartItems.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <img src="${item.image}" alt="${item.title}" class="cart-item-image">
                    <div class="cart-item-info">
                        <div class="cart-item-title">${item.title}</div>
                        <div class="cart-item-details">${item.artist} - ${item.size}</div>
                        <div class="cart-item-price">₱${item.price.toFixed(2)}</div>
                        <div class="quantity-controls">
                            <button class="quantity-btn" onclick="updateQuantity(${item.id}, '${item.size}', -1)">-</button>
                            <span class="quantity">${item.quantity}</span>
                            <button class="quantity-btn" onclick="updateQuantity(${item.id}, '${item.size}', 1)">+</button>
                        </div>
                        <button class="remove-item" onclick="removeFromCart(${item.id}, '${item.size}')">Remove</button>
                    </div>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartTotal.textContent = `₱${total.toFixed(2)}`;
        }

        function updateQuantity(productId, size, change) {
            const item = cart.find(item => item.id === productId && item.size === size);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(productId, size);
                } else {
                    updateCartUI();
                    saveCartToStorage();
                }
            }
        }

        function removeFromCart(productId, size) {
            cart = cart.filter(item => !(item.id === productId && item.size === size));
            updateCartUI();
            saveCartToStorage();
        }

        function toggleCart() {
            const cartModal = document.getElementById('cartModal');
            cartModal.style.display = cartModal.style.display === 'block' ? 'none' : 'block';
        }

        function proceedToCheckout() {
            if (cart.length === 0) {
                alert('Your cart is empty');
                return;
            }
            
            toggleCart();
            window.location.href = 'checkout.html';
        }

        function saveCartToStorage() {
            localStorage.setItem('vinlyStoreCart', JSON.stringify(cart));
        }

        function loadCartFromStorage() {
            const savedCart = localStorage.getItem('vinlyStoreCart');
            if (savedCart) {
                cart = JSON.parse(savedCart);
            }
        }

        window.onclick = function(event) {
            const cartModal = document.getElementById('cartModal');
            if (event.target === cartModal) {
                toggleCart();
            }
        }

        initializeApp();
    </script>
</body>
</html>
